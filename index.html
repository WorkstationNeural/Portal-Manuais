            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-sitemap&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Quem é a Equipe de TI?&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Para melhor atendê-lo, nossa equipe é dividida em dois níveis de suporte.
                        Conhecer a função de cada um ajuda a entender o fluxo do seu chamado.&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-headset&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Suporte N1: Apoio Imediato&lt;/h4&gt;
                            &lt;p&gt;É a equipe de primeiro contato, responsável por registrar seu chamado e resolver as
                                solicitações mais comuns, como problemas de senha, configuração de e-mail e falhas de
                                software. A equipe é composta por Helpdesk, Servicedesk e Gestão de Acessos.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-cogs&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Suporte N2: Analistas e Especialistas&lt;/h4&gt;
                            &lt;p&gt;Quando um problema é mais complexo, como uma falha de rede, um problema de servidor ou
                                uma ameaça de segurança, a equipe N1 encaminha o chamado para os especialistas do N2,
                                que possuem conhecimento aprofundado para investigar e solucionar a causa raiz.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
        &lt;div id=&quot;solicitando-suporte&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-question-circle&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;O que é um Chamado?&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Para organizar as solicitações, dividimos os chamados em duas categorias
                        principais. Entender a diferença nos ajuda a atendê-lo melhor.&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-fire&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Incidente&lt;/h4&gt;
                            &lt;p&gt;Um incidente é uma interrupção inesperada de um serviço. Em outras palavras: &lt;strong&gt;algo
                                    que estava funcionando e parou de funcionar&lt;/strong&gt;. Exemplos: &quot;minha internet
                                caiu&quot;, &quot;não consigo acessar o sistema X&quot;, &quot;meu computador não liga&quot;.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-plus-circle&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Requisição&lt;/h4&gt;
                            &lt;p&gt;Uma requisição é um pedido para algo novo. &lt;strong&gt;É uma solicitação de um serviço,
                                    acesso ou equipamento que você ainda não tem&lt;/strong&gt;. Exemplos: &quot;preciso de acesso
                                à pasta Y&quot;, &quot;solicito a instalação do software Z&quot;, &quot;preciso de um novo mouse&quot;.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-laptop-code&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Canais Oficiais para Solicitações&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Para garantir que sua solicitação seja registrada e atendida dentro do prazo,
                        utilize sempre nossos canais oficiais:&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-ticket-alt&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Abertura de Chamado via GLPI&lt;/h4&gt;
                            &lt;p&gt;Este é o canal &lt;strong&gt;preferencial&lt;/strong&gt; para todas as solicitações. O GLPI é nossa
                                ferramenta de gestão de chamados, onde tudo fica registrado e rastreado. Ele garante que
                                sua solicitação não se perca e seja direcionada para a equipe correta.&lt;/p&gt;
                            &lt;a href=&quot;http://helpdesk/front/central.php&quot; target=&quot;_blank&quot; class=&quot;action-button&quot;&gt;ABRIR
                                CHAMADO NO GLPI&lt;/a&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-envelope&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Formalização por E-mail&lt;/h4&gt;
                            &lt;p&gt;Em casos específicos, como solicitações de acesso que exigem aprovação formal de um
                                gestor, o pedido pode ser feito via e-mail. Sempre inclua o máximo de detalhes possível,
                                como nome completo, login de rede, qual acesso é necessário e a justificativa.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
        &lt;div id=&quot;como-abrir-chamados&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-clipboard-list&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Guia Prático: Abertura de Chamados no GLPI&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Criamos este guia para simplificar o processo, promover a padronização e
                        garantir que sua solicitação contenha todas as informações necessárias para um atendimento
                        rápido e eficaz.&lt;/p&gt;

                    &lt;h3&gt;Critérios para Abertura de Chamado&lt;/h3&gt;
                    &lt;ul class=&quot;step-by-step-list&quot;&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-tag&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;1. Defina o Tipo:&lt;/strong&gt; No GLPI, sempre especifique se o seu chamado é um
                                &lt;strong&gt;Incidente&lt;/strong&gt; (algo quebrou) ou uma &lt;strong&gt;Requisição&lt;/strong&gt; (um novo
                                pedido).
                            &lt;/div&gt;
                        &lt;/li&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-sitemap&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;2. Escolha a Categoria:&lt;/strong&gt; Selecione a categoria que melhor descreve seu
                                problema (ex: &quot;Sistemas&quot;, &quot;Rede&quot;, &quot;Hardware&quot;). Busque por palavras-chave para encontrar
                                a mais adequada.&lt;/div&gt;
                        &lt;/li&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-map-marker-alt&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;3. Informe a Localização:&lt;/strong&gt; Sempre preencha sua localização completa.
                                Exemplo: &quot;São Luís &gt; Operação &gt; Presencial &gt; Europ&quot;.&lt;/div&gt;
                        &lt;/li&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-file-alt&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;4. Preencha a Descrição:&lt;/strong&gt; Utilize o campo &quot;Descrição&quot; para detalhar o
                                problema, seguindo o modelo que aparece automaticamente e preenchendo todos os dados
                                obrigatórios solicitados.&lt;/div&gt;
                        &lt;/li&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-paperclip&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;5. Anexe Evidências:&lt;/strong&gt; Sempre que possível, inclua &quot;Anexos&quot; (prints da
                                tela do erro, fotos ou documentos) que ajudem a ilustrar o problema.&lt;/div&gt;
                        &lt;/li&gt;
                    &lt;/ul&gt;

                    &lt;h3&gt;Pontos de Atenção&lt;/h3&gt;
                    &lt;div class=&quot;attention-box&quot;&gt;
                        &lt;p&gt;&lt;strong&gt;Sobre as Categorias:&lt;/strong&gt; Busque sempre pela categoria exata. Se não encontrar,
                            utilize o filtro mais próximo. A equipe de Suporte poderá reclassificar se necessário.&lt;/p&gt;
                        &lt;p&gt;&lt;strong&gt;Sobre a Descrição:&lt;/strong&gt; Não apague os textos informativos do modelo. Preencha
                            apenas as informações obrigatórias solicitadas para que o chamado seja atendido da forma
                            mais célere.&lt;/p&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;Por que pedimos certos dados?&lt;/h3&gt;
                    &lt;table&gt;
                        &lt;thead&gt;
                            &lt;tr&gt;
                                &lt;th&gt;Dado Solicitado&lt;/th&gt;
                                &lt;th&gt;Utilidade&lt;/th&gt;
                                &lt;th&gt;Obrigatoriedade&lt;/th&gt;
                            &lt;/tr&gt;
                        &lt;/thead&gt;
                        &lt;tbody&gt;
                            &lt;tr&gt;
                                &lt;td&gt;* Endereço IP&lt;/td&gt;
                                &lt;td&gt;Serve para registro e identificação da máquina na rede.&lt;/td&gt;
                                &lt;td&gt;Obrigatório (Apenas Presencial)&lt;/td&gt;
                            &lt;/tr&gt;
                            &lt;tr&gt;
                                &lt;td&gt;* Hostname&lt;/td&gt;
                                &lt;td&gt;Alternativa para Suporte remoto.&lt;/td&gt;
                                &lt;td&gt;Obrigatório (Presencial e Home Office)&lt;/td&gt;
                            &lt;/tr&gt;
                            &lt;tr&gt;
                                &lt;td&gt;* Anydesk&lt;/td&gt;
                                &lt;td&gt;Necessário para Suporte remoto.&lt;/td&gt;
                                &lt;td&gt;Obrigatório (Apenas Home Office)&lt;/td&gt;
                            &lt;/tr&gt;
                            &lt;tr&gt;
                                &lt;td&gt;* Matrícula&lt;/td&gt;
                                &lt;td&gt;Necessário para controle de reincidências e registro.&lt;/td&gt;
                                &lt;td&gt;Obrigatório (Presencial e Home Office)&lt;/td&gt;
                            &lt;/tr&gt;
                        &lt;/tbody&gt;
                    &lt;/table&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
        &lt;div id=&quot;entendendo-atendimento&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-tasks&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Como seu Chamado é Tratado?&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Depois de aberto, seu chamado passa por um fluxo para garantir a melhor
                        priorização e resolução. Entenda os conceitos-chave:&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-sort-amount-up&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Impacto e Urgência = Prioridade&lt;/h4&gt;
                            &lt;p&gt;A prioridade do seu chamado é calculada com base no &lt;strong&gt;Impacto&lt;/strong&gt; (quantos
                                usuários são afetados) e na &lt;strong&gt;Urgência&lt;/strong&gt; (qual a criticidade do serviço
                                para a operação). Um sistema fora do ar para toda a operação (alto impacto) tem
                                prioridade maior que um mouse quebrado para um usuário (baixo impacto).&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-hourglass-half&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Prazo de Atendimento (Incidentes)&lt;/h4&gt;
                            &lt;ul class=&quot;sla-list&quot;&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-exclamation-circle high&quot;&gt;&lt;/i&gt; &lt;strong&gt;Alta prioridade:&lt;/strong&gt; 2
                                    horas&lt;/li&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-exclamation-triangle medium&quot;&gt;&lt;/i&gt; &lt;strong&gt;Média
                                        prioridade:&lt;/strong&gt; 10 horas&lt;/li&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-info-circle low&quot;&gt;&lt;/i&gt; &lt;strong&gt;Baixa prioridade:&lt;/strong&gt; 24 horas
                                &lt;/li&gt;
                            &lt;/ul&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-calendar-alt&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Prazo de Atendimento (Requisições)&lt;/h4&gt;
                            &lt;ul class=&quot;sla-list&quot;&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-exclamation-circle high&quot;&gt;&lt;/i&gt; &lt;strong&gt;Alta prioridade:&lt;/strong&gt; 2
                                    dias (Aprox.)&lt;/li&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-exclamation-triangle medium&quot;&gt;&lt;/i&gt; &lt;strong&gt;Média
                                        prioridade:&lt;/strong&gt; 7 dias (Aprox.)&lt;/li&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-info-circle low&quot;&gt;&lt;/i&gt; &lt;strong&gt;Baixa prioridade:&lt;/strong&gt; 10 dias
                                    (Aprox.)&lt;/li&gt;
                            &lt;/ul&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;p class=&quot;sla-note&quot;&gt;&lt;strong&gt;NOTA:&lt;/strong&gt; O prazo de atendimento pode variar conforme a
                        complexidade do chamado e o volume de demandas em andamento.&lt;/p&gt;

                    &lt;h3&gt;Definição de Impacto&lt;/h3&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-bomb high&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Alto&lt;/h4&gt;
                            &lt;p&gt;Mais de 75% da operação total está sendo impactada ou interrupção total dos serviços
                                operacionais.&lt;br&gt;&lt;br&gt;&lt;strong&gt;CONTRATO LOCTK2602-0004&lt;/strong&gt;&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-exclamation-triangle medium&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Médio&lt;/h4&gt;
                            &lt;p&gt;Entre 30% e 75% da operação total está sendo impactada ou interrupção nas
                                operações/serviços que tenham algum impacto negativo ou degradado, contudo, não impeçam
                                o seu funcionamento.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-info-circle low&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Baixo&lt;/h4&gt;
                            &lt;p&gt;Menos de 30% da operação total está sendo impactada ou alguma interrupção pontual das
                                operações ou serviços, com baixo impacto em reduzido número de equipamentos.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;O Ciclo de Vida de um Chamado&lt;/h3&gt;
                    &lt;div class=&quot;status-flow-container&quot;&gt;
                        &lt;div class=&quot;status-card status-novo&quot;&gt;
                            &lt;i class=&quot;fas fa-plus-circle&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Novo&lt;/h4&gt;
                            &lt;p&gt;Seu chamado foi recebido e aguarda atribuição.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;i class=&quot;fas fa-arrow-right flow-arrow&quot;&gt;&lt;/i&gt;
                        &lt;div class=&quot;status-card status-atendimento&quot;&gt;
                            &lt;i class=&quot;fas fa-cogs&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Em Atendimento&lt;/h4&gt;
                            &lt;p&gt;Um técnico está trabalhando na sua solicitação.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;i class=&quot;fas fa-arrow-right flow-arrow&quot;&gt;&lt;/i&gt;
                        &lt;div class=&quot;status-card status-pendente&quot;&gt;
                            &lt;i class=&quot;fas fa-pause-circle&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Pendente&lt;/h4&gt;
                            &lt;p&gt;Aguardando uma resposta sua ou de terceiros.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;i class=&quot;fas fa-arrow-right flow-arrow&quot;&gt;&lt;/i&gt;
                        &lt;div class=&quot;status-card status-solucionado&quot;&gt;
                            &lt;i class=&quot;fas fa-check-circle&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Solucionado&lt;/h4&gt;
                            &lt;p&gt;Resolvido e aguardando sua aprovação para fechar.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
        &lt;div id=&quot;eventos-criticos&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-bullhorn&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Processo de Eventos Críticos&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Um Evento Crítico é um incidente de alto impacto que afeta um grande número de
                        usuários (50% a 100% de uma operação). A comunicação é centralizada em um grupo de WhatsApp para
                        garantir agilidade.&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-file-medical-alt&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;O Que Reportar?&lt;/h4&gt;
                            &lt;p&gt;Apenas incidentes massivos. Exemplos: queda de sistema para toda a equipe, falha geral de
                                telefonia, indisponibilidade de acesso à rede para múltiplos usuários.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-user-tie&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Quem Reporta?&lt;/h4&gt;
                            &lt;p&gt;O reporte deve ser feito exclusivamente por Coordenadores, Gerentes ou Diretores da
                                operação, após confirmarem a massividade do evento.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-sitemap&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;O Que Acontece Depois?&lt;/h4&gt;
                            &lt;p&gt;O time de TI avalia o reporte, faz a triagem para a equipe N2 responsável e, se
                                necessário, aciona fornecedores ou clientes. A comunicação sobre o andamento é feita no
                                próprio grupo.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;a href=&quot;http://portalelo.elocontactcenter.com.br/download/manuais/Processo%20de%20Atendimento%20a%20Eventos%20Cr%C3%ADticos.pdf&quot;
                        target=&quot;_blank&quot; class=&quot;action-button&quot;&gt;Acessar Documento Oficial&lt;/a&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
        &lt;div id=&quot;home-office&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-house-user&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Modalidade Home Office&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Fluxo definido para saída, retorno, troca casada e desligamento de
                        colaboradores em regime de Home Office. Este processo garante o controle efetivo dos
                        equipamentos e o cumprimento dos prazos.&lt;/p&gt;

                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-sign-out-alt&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Saída para Home Office&lt;/h4&gt;
                            &lt;p&gt;Abertura via GLPI pelo Supervisor com teste de internet (mín 50Mb/s). Envolve aprovação
                                do Planejamento, validação técnica da TI e aditivo contratual do DP. Retirada na TI após
                                aprovação.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-sign-in-alt&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Retorno ao Presencial&lt;/h4&gt;
                            &lt;p&gt;Solicitação via GLPI. Planejamento valida espaço físico. DP formaliza retorno.
                                Equipamentos devem ser devolvidos na TI para vistoria e baixa no sistema CETI.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-exchange-alt&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Troca Casada&lt;/h4&gt;
                            &lt;p&gt;Troca simultânea entre operadores do mesmo turno/segmento. Validação do Planejamento
                                necessária. TI avalia e realiza a troca física dos equipamentos entre os colaboradores.
                            &lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-user-times&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Desligamento&lt;/h4&gt;
                            &lt;p&gt;Abertura de chamado de desligamento. Devolução imediata dos equipamentos na TI. DP
                                verifica pendências no sistema CETI antes da rescisão. Prazo de devolução: 72h.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;Prazos e SLAs&lt;/h3&gt;
                    &lt;ul class=&quot;sla-list&quot;&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-clock medium&quot;&gt;&lt;/i&gt; &lt;strong&gt;Planejamento:&lt;/strong&gt; 72h úteis para avaliação.

        #modalContent {
            line-height: 1.7;
        }

        #modalContent a {
            color: #0ca5c7;
            text-decoration: underline;
        }

        #modalContent a:hover {
            color: white;
        }

        #modalContent ul {
            padding-left: 25px;
            margin-top: 10px;
        }

        #modalContent li {
            margin-bottom: 8px;
        }

        #modalContent table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        #modalContent th,
        #modalContent td {
            border: 1px solid #0ca5c7;
            padding: 8px 12px;
            text-align: left;
        }

        #modalContent th {
            background-color: #096f8e;
        }

        #modalContent code {
            background-color: #004c5a;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: &#x27;Courier New&#x27;, Courier, monospace;
        }

        /* Barra Lateral com Efeito de Vidro */
        .sidebar {
            height: 100%;
            width: 280px;
            position: fixed;
            z-index: 2000;
            top: 0;
            left: 0;
            background-color: rgba(7, 89, 113, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: 0.5s;
            transform: translateX(-100%);
            padding-top: 60px;
            border-right: 3px solid #0ca5c7;
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar .sidebar-item a,
        .sidebar .submenu a {
            padding: 10px 15px 10px 32px;
            text-decoration: none;
            font-size: 18px;
            color: #cccccc;
            display: block;
            transition: 0.3s;
        }

        .sidebar .sidebar-item&gt;a {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .sidebar a:hover {
            color: #ffffff;
            background-color: #096f8e;
        }

        .sidebar .submenu {
            list-style: none;
            padding-left: 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
        }

        .sidebar .sidebar-item.active .submenu {
            max-height: 500px;
        }

        .sidebar .sidebar-item a .fa-whatsapp {
            color: #25D366;
        }

        .open-btn {
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
            padding: 0 15px;
        }

        .overlay {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1999;
        }

        .overlay.active {
            display: block;
        }

        /* Estilos da Barra de Busca */
        .search-bar-container {
            position: relative;
            margin-bottom: 20px;
        }

        .search-bar-container i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #cccccc;
        }

        .search-input {
            width: 100%;
            padding: 12px 20px 12px 45px;
            border-radius: 25px;
            border: 1px solid #0ca5c7;
            background-color: #096f8e;
            color: #f0f0f0;
            font-size: 1em;
            box-sizing: border-box;
        }

        .search-input::placeholder {
            color: #cccccc;
        }

        .search-input:focus {
            outline: none;
            border-color: white;
        }

        /* Rodapé */
        footer {
            text-align: center;
            padding: 20px;
            background-color: #075971;
            border-top: 3px solid #0ca5c7;
            font-size: 0.9em;
            color: #cccccc;
            margin-top: 40px;
        }
    &lt;/style&gt;
&lt;/head&gt;

    &lt;main&gt;
        &lt;div id=&quot;inicio&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-rocket&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Boas-vindas à Equipe de Tecnologia!&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p&gt;Seja bem-vindo(a)! Este manual foi criado para ser seu guia de referência no dia a dia do nosso
                        departamento. Aqui você encontrará informações essenciais sobre nossas ferramentas, processos e
                        a estrutura da nossa equipe. Nosso objetivo é que você se sinta integrado e produtivo o mais
                        rápido possível.&lt;/p&gt;
                &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-sitemap&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Nossa Estrutura Organizacional&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p style=&quot;text-align: center; margin-bottom: 25px;&quot;&gt;O time de Tecnologia faz parte da
                        &lt;strong&gt;Central de Serviços Compartilhados - Neural&lt;/strong&gt;. Nossa equipe é dividida em dois
                        níveis de suporte para garantir um atendimento ágil e especializado:&lt;/p&gt;
                    &lt;h3&gt;&lt;i class=&quot;fas fa-headset&quot;&gt;&lt;/i&gt; Suporte N1 e Gestão de Acessos (Primeiro Nível)&lt;/h3&gt;
                    &lt;div class=&quot;team-grid&quot;&gt;
                        &lt;div class=&quot;team-item&quot; onclick=&quot;openStructureModal(&#x27;helpdesk&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-headset&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Helpdesk&lt;/h4&gt;
                            &lt;p&gt;Atendimento remoto para solução de problemas de baixa e média complexidade.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;team-item&quot; onclick=&quot;openStructureModal(&#x27;fieldservice&#x27;)&quot;&gt;&lt;i
                                class=&quot;fas fa-toolbox&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Fieldservice&lt;/h4&gt;
                            &lt;p&gt;Suporte técnico presencial para estações de trabalho, hardware e periféricos.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;team-item&quot; onclick=&quot;openStructureModal(&#x27;servicedesk&#x27;)&quot;&gt;&lt;i
                                class=&quot;fas fa-concierge-bell&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Servicedesk&lt;/h4&gt;
                            &lt;p&gt;Ponto único de contato para registrar, priorizar e encaminhar todas as solicitações de
                                TI.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;team-item&quot; onclick=&quot;openStructureModal(&#x27;ga&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-user-shield&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;G.A (Gestão de Acessos)&lt;/h4&gt;
                            &lt;p&gt;Responsável pela criação, alteração e revogação de acessos a sistemas e recursos da
                                empresa.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;h3&gt;&lt;i class=&quot;fas fa-cogs&quot;&gt;&lt;/i&gt; Suporte N2 (Segundo Nível)&lt;/h3&gt;
                    &lt;div class=&quot;team-grid&quot;&gt;
                        &lt;div class=&quot;team-item&quot; onclick=&quot;openStructureModal(&#x27;infra&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-server&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Infraestrutura de TI&lt;/h4&gt;
                            &lt;p&gt;Gerencia e mantém os ativos físicos de TI, como servidores, storages e datacenters.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;team-item&quot; onclick=&quot;openStructureModal(&#x27;redes&#x27;)&quot;&gt;&lt;i
                                class=&quot;fas fa-network-wired&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Redes e Sistemas&lt;/h4&gt;
                            &lt;p&gt;Responsável pela arquitetura, manutenção e segurança das redes de dados e sistemas
                                operacionais.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;team-item&quot; onclick=&quot;openStructureModal(&#x27;secinfo&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-shield-alt&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Segurança da Informação&lt;/h4&gt;
                            &lt;p&gt;Garante a confidencialidade, integridade e disponibilidade das informações da empresa.
                            &lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;team-item&quot; onclick=&quot;openStructureModal(&#x27;telecom&#x27;)&quot;&gt;&lt;i
                                class=&quot;fas fa-broadcast-tower&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Telecom&lt;/h4&gt;
                            &lt;p&gt;Responsável pelos serviços de telefonia e todas as formas de comunicação unificada.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
        &lt;div id=&quot;ferramentas&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-tools&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;A Jornada de um Colaborador de TI&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p&gt;Bem-vindo(a) à equipe! Sua jornada começa aqui. Para te ajudar a se localizar, organizamos nossas
                        ferramentas de acordo com as tarefas que você realizará no seu dia a dia. Use a busca abaixo
                        para encontrar algo específico.&lt;/p&gt;
                    &lt;div class=&quot;search-bar-container&quot;&gt;
                        &lt;i class=&quot;fas fa-search&quot;&gt;&lt;/i&gt;
                        &lt;input type=&quot;text&quot; id=&quot;ferramentas-search&quot; class=&quot;search-input&quot;
                            onkeyup=&quot;filterGrid(&#x27;ferramentas-search&#x27;, &#x27;#ferramentas .tool-item, #ferramentas .sub-tool-item&#x27;, &#x27;.tool-name&#x27;, &#x27;block&#x27;)&quot;
                            placeholder=&quot;Buscar ferramenta...&quot;&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;Seu Primeiro Dia: Ponto e Comunicação&lt;/h3&gt;
                    &lt;p&gt;Para começar, você precisa saber como registrar seu ponto e se comunicar com a equipe.&lt;/p&gt;
                    &lt;div class=&quot;tools-grid&quot;&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;forponto&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-clock&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Forponto&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;dponline&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-user-clock&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;DP Online&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;outlook&#x27;)&quot;&gt;&lt;i
                                class=&quot;fas fa-envelope-open-text&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Outlook&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;discord&#x27;)&quot;&gt;&lt;i class=&quot;fab fa-discord&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Discord&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;whatsapp&#x27;)&quot;&gt;&lt;i class=&quot;fab fa-whatsapp&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;WhatsApp&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;Ferramentas de Produtividade&lt;/h3&gt;
                    &lt;p&gt;O essencial para criar documentos, planilhas e apresentações no dia a dia.&lt;/p&gt;
                    &lt;div class=&quot;tools-grid&quot;&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;office&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-file-word&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Pacote Office&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;Atendendo a um Chamado: O Ciclo de Suporte&lt;/h3&gt;
                    &lt;p&gt;Tudo começa com um chamado. Use estas ferramentas para registrar, acessar o usuário e resolver o
                        problema.&lt;/p&gt;
                    &lt;div class=&quot;tools-grid&quot;&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;glpi&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-ticket-alt&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;GLPI&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;anydesk&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-desktop&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Anydesk&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;uvnc&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-laptop-house&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;UVNC&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;h4&gt;Módulos Principais do GLPI&lt;/h4&gt;
                    &lt;div class=&quot;sub-tools-grid&quot;&gt;
                        &lt;div class=&quot;sub-tool-item&quot; onclick=&quot;openToolModal(&#x27;glpi&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-tasks&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Registro de Atividades&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;sub-tool-item&quot; onclick=&quot;openToolModal(&#x27;glpi&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-sync-alt&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Gestão de Problemas&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;sub-tool-item&quot; onclick=&quot;openToolModal(&#x27;glpi&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-house-user&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Fluxo Home Office&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;Mantendo a Ordem: Controles e Documentação&lt;/h3&gt;
                    &lt;p&gt;A organização é chave. Estas são as ferramentas para controlar nossos ativos e centralizar nosso
                        conhecimento.&lt;/p&gt;
                    &lt;div class=&quot;tools-grid&quot;&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;ceti&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-laptop-code&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;CETI&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;sharepoint&#x27;)&quot;&gt;&lt;i class=&quot;fab fa-microsoft&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;SharePoint&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;Ferramentas de Administração e Monitoramento&lt;/h3&gt;
                    &lt;p&gt;Para as tarefas mais complexas, como monitoramento, segurança e gerenciamento de infraestrutura.
                    &lt;/p&gt;
                    &lt;div class=&quot;tools-grid&quot;&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;grafana&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-chart-area&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Grafana&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;sophos&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-user-secret&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;VPN Sophos&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;mav&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-shield-virus&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Painel MAV&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;ad&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-address-book&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Active Directory&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;tool-item&quot; onclick=&quot;openToolModal(&#x27;hyperv&#x27;)&quot;&gt;&lt;i class=&quot;fas fa-layer-group&quot;&gt;&lt;/i&gt;
                            &lt;p class=&quot;tool-name&quot;&gt;Hyper-V&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;Ferramentas do Gestor&lt;/h3&gt;

        const coverPage = document.getElementById(&#x27;cover-page&#x27;);
        const enterButton = document.getElementById(&#x27;enter-button&#x27;);
        let coverHidden = false;

        function hideCover() {
            if (coverHidden) return;
            coverHidden = true;
            coverPage.classList.add(&#x27;hidden&#x27;);
            document.body.style.overflowY = &#x27;auto&#x27;;
            setTimeout(() =&gt; { coverPage.style.display = &#x27;none&#x27;; }, 800);
        }

        function openTab(evt, tabName) {
            let i, tabContent, tabButtons;
            tabContent = document.getElementsByClassName(&quot;tab-content&quot;);
            for (i = 0; i &lt; tabContent.length; i++) { tabContent[i].classList.remove(&quot;active&quot;); }
            tabButtons = document.getElementsByClassName(&quot;tab-button&quot;);
            for (i = 0; i &lt; tabButtons.length; i++) { tabButtons[i].classList.remove(&quot;active&quot;); }
            setTimeout(() =&gt; document.getElementById(tabName).classList.add(&quot;active&quot;), 10);
            if (evt.currentTarget.classList.contains(&#x27;tab-button&#x27;)) { evt.currentTarget.classList.add(&quot;active&quot;); }
            else { document.querySelector(&#x27;button[onclick*=&quot;\&#x27;inicio\&#x27;&quot;]&#x27;).classList.add(&quot;active&quot;); }
        }

        document.addEventListener(&quot;DOMContentLoaded&quot;, () =&gt; {
            document.querySelector(&#x27;.tab-button&#x27;).classList.add(&#x27;active&#x27;);
            document.querySelector(&#x27;.tab-content&#x27;).classList.add(&#x27;active&#x27;);

            enterButton.addEventListener(&#x27;click&#x27;, hideCover);
            window.addEventListener(&#x27;wheel&#x27;, hideCover, { once: true });
            window.addEventListener(&#x27;scroll&#x27;, hideCover, { once: true });
            window.addEventListener(&#x27;touchstart&#x27;, hideCover, { once: true });

            const observer = new IntersectionObserver((entries) =&gt; {
                entries.forEach(entry =&gt; {
                    if (entry.isIntersecting) {
                        entry.target.classList.add(&#x27;visible&#x27;);
                    }
                });
            }, { threshold: 0.1 });

            const cardsToAnimate = document.querySelectorAll(&#x27;.card&#x27;);
            cardsToAnimate.forEach(card =&gt; observer.observe(card));
        });

            background: #08637e;
            border-radius: 8px;
            border-top: 5px solid transparent;
            padding: 20px;
            text-align: center;
            flex: 1;
            min-width: 150px;
            transition: transform 0.3s;
        }

        .status-card:hover {
            transform: translateY(-5px);
        }

        .status-card i {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .status-card h4 {
            margin: 0 0 10px 0;
            font-size: 1.1em;
            color: white;
        }

        .status-card p {
            font-size: 0.85em;
            color: #cccccc;
            margin: 0;
        }

        .flow-arrow {
            font-size: 2em;
            color: #0ca5c7;
            opacity: 0.7;
        }

        .status-card.status-novo {
            border-top-color: #3a86ff;
        }

        .status-card.status-novo i {
            color: #3a86ff;
        }

        .status-card.status-atendimento {
            border-top-color: #ff9f1c;
        }

        .status-card.status-atendimento i {
            color: #ff9f1c;
        }

        .status-card.status-pendente {
            border-top-color: #ffca3a;
        }

        .status-card.status-pendente i {
            color: #ffca3a;
        }

        .status-card.status-solucionado {
            border-top-color: #2ec4b6;
        }

        .status-card.status-solucionado i {
            color: #2ec4b6;
        }

        /* Estilo da Imagem do Organograma */
        .organogram-image {
            width: 100%;
            height: auto;
            max-width: 100%;
            display: block;
            margin: 0 auto;
            border-radius: 6px;
        }

        @media (max-width: 992px) {
            .status-flow-container {
                flex-direction: column;
            }

            .flow-arrow {
                transform: rotate(90deg);
                margin: 15px 0;
            }
        }
    &lt;/style&gt;

            Organograma&lt;/button&gt;

    &lt;main&gt;
        &lt;div id=&quot;inicio&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-rocket&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Finalidade do Manual&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p&gt;Este manual tem como objetivo orientar os colaboradores das áreas de Staff sobre as boas práticas
                        relacionadas ao uso de sistemas, registro de chamados e comunicação com o setor de TI.&lt;/p&gt;
                    &lt;p&gt;As orientações aqui apresentadas padronizam o fluxo de solicitações e incidentes, garantindo
                        eficiência, rastreabilidade e conformidade com as políticas internas do Grupo Elo.&lt;/p&gt;
                &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-sitemap&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Quem é a Equipe de TI?&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Para melhor atendê-lo, nossa equipe é dividida em dois níveis de suporte.
                        Conhecer a função de cada um ajuda a entender o fluxo do seu chamado.&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-headset&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Suporte N1: Apoio Imediato&lt;/h4&gt;
                            &lt;p&gt;É a equipe de primeiro contato, responsável por registrar seu chamado e resolver as
                                solicitações mais comuns, como problemas de senha, configuração de e-mail e falhas de
                                software.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-cogs&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Suporte N2: Analistas e Especialistas&lt;/h4&gt;
                            &lt;p&gt;Quando um problema é mais complexo, como uma falha de rede ou de servidor, a equipe N1
                                encaminha o chamado para os especialistas do N2, que possuem conhecimento aprofundado
                                para investigar e solucionar a causa raiz.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
        &lt;div id=&quot;solicitando-suporte&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-question-circle&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Tipos de Chamado&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Para organizar as solicitações, dividimos os chamados em duas categorias
                        principais. Entender a diferença nos ajuda a atendê-lo melhor.&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-fire&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Incidente&lt;/h4&gt;
                            &lt;p&gt;Ocorrência que afeta o funcionamento de sistemas, equipamentos ou credenciais de acesso.
                                Exemplo: falha em login, sistema fora do ar, lentidão de rede, falha de periférico.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-plus-circle&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Requisição&lt;/h4&gt;
                            &lt;p&gt;Solicitação para obter um novo serviço, acesso, recurso ou ajuste que não está
                                relacionado a uma falha técnica. Exemplo: liberação de acesso, instalação de software,
                                equipamento (monitor, headset, mouse).&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-cogs&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Processos Comuns&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Conheça os fluxos para as solicitações mais frequentes da área de Staff.&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-box-open&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Solicitação de Equipamentos Avulsos&lt;/h4&gt;
                            &lt;p&gt;Processo para disponibilização de equipamentos avulsos para necessidade pontual,
                                substituição temporária ou apoio a projetos.&lt;/p&gt;
                            &lt;a href=&quot;http://portalelo.elocontactcenter.com.br/download/manuais/Novos%20colaboradores%20STAFF.pdf&quot;
                                target=&quot;_blank&quot; class=&quot;action-button&quot;&gt;Consultar Documento&lt;/a&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-house-user&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Modalidade Home Office&lt;/h4&gt;
                            &lt;p&gt;Fluxo de entrada e saída de colaboradores em H.O, abrangendo autorizações, controle de
                                acessos e devolução de equipamentos.&lt;/p&gt;
                            &lt;a href=&quot;http://portalelo.elocontactcenter.com.br/download/Manuais/Processo%20do%20Fluxo%20de%20Home%20Office.pdf&quot;
                                target=&quot;_blank&quot; class=&quot;action-button&quot;&gt;Consultar Documento&lt;/a&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
        &lt;div id=&quot;como-abrir-chamados&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-clipboard-list&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Guia Prático: Abertura de Chamados no GLPI&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Criamos este guia para simplificar o processo, promover a padronização e
                        garantir que sua solicitação contenha todas as informações necessárias para um atendimento
                        rápido e eficaz.&lt;/p&gt;

                    &lt;h3&gt;Critérios para Abertura de Chamado&lt;/h3&gt;
                    &lt;ul class=&quot;step-by-step-list&quot;&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-tag&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;1. Defina o Tipo:&lt;/strong&gt; No GLPI, sempre especifique se o seu chamado é um
                                &lt;strong&gt;Incidente&lt;/strong&gt; (algo quebrou) ou uma &lt;strong&gt;Requisição&lt;/strong&gt; (um novo
                                pedido).
                            &lt;/div&gt;
                        &lt;/li&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-sitemap&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;2. Escolha a Categoria:&lt;/strong&gt; Selecione a categoria que melhor descreve seu
                                problema (ex: &quot;Sistemas&quot;, &quot;Rede&quot;, &quot;Hardware&quot;). Busque por palavras-chave para encontrar
                                a mais adequada.&lt;/div&gt;
                        &lt;/li&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-map-marker-alt&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;3. Informe a Localização:&lt;/strong&gt; Sempre preencha sua localização completa.
                                Exemplo: &quot;São Luís &gt; Operação &gt; Presencial &gt; Europ&quot;.&lt;/div&gt;
                        &lt;/li&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-file-alt&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;4. Preencha a Descrição:&lt;/strong&gt; Utilize o campo &quot;Descrição&quot; para detalhar o
                                problema, seguindo o modelo que aparece automaticamente e preenchendo todos os dados
                                obrigatórios solicitados.&lt;/div&gt;
                        &lt;/li&gt;
                        &lt;li&gt;&lt;i class=&quot;fas fa-paperclip&quot;&gt;&lt;/i&gt;
                            &lt;div&gt;&lt;strong&gt;5. Anexe Evidências:&lt;/strong&gt; Sempre que possível, inclua &quot;Anexos&quot; (prints da
                                tela do erro, fotos ou documentos) que ajudem a ilustrar o problema.&lt;/div&gt;
                        &lt;/li&gt;
                    &lt;/ul&gt;

                    &lt;h3&gt;Pontos de Atenção&lt;/h3&gt;
                    &lt;div class=&quot;attention-box&quot;&gt;
                        &lt;p&gt;&lt;strong&gt;Sobre as Categorias:&lt;/strong&gt; Busque sempre pela categoria exata. Se não encontrar,
                            utilize o filtro mais próximo. A equipe de Suporte poderá reclassificar se necessário.&lt;/p&gt;
                        &lt;p&gt;&lt;strong&gt;Sobre a Descrição:&lt;/strong&gt; Não apague os textos informativos do modelo. Preencha
                            apenas as informações obrigatórias solicitadas para que o chamado seja atendido da forma
                            mais célere.&lt;/p&gt;
                    &lt;/div&gt;

                    &lt;h3&gt;Por que pedimos certos dados?&lt;/h3&gt;
                    &lt;table&gt;
                        &lt;thead&gt;
                            &lt;tr&gt;
                                &lt;th&gt;Dado Solicitado&lt;/th&gt;
                                &lt;th&gt;Utilidade&lt;/th&gt;
                                &lt;th&gt;Obrigatoriedade&lt;/th&gt;
                            &lt;/tr&gt;
                        &lt;/thead&gt;
                        &lt;tbody&gt;
                            &lt;tr&gt;
                                &lt;td&gt;* Endereço IP&lt;/td&gt;
                                &lt;td&gt;Serve para registro e identificação da máquina na rede.&lt;/td&gt;
                                &lt;td&gt;Obrigatório (Apenas Presencial)&lt;/td&gt;
                            &lt;/tr&gt;
                            &lt;tr&gt;
                                &lt;td&gt;* Hostname&lt;/td&gt;
                                &lt;td&gt;Alternativa para Suporte remoto.&lt;/td&gt;
                                &lt;td&gt;Obrigatório (Presencial e Home Office)&lt;/td&gt;
                            &lt;/tr&gt;
                            &lt;tr&gt;
                                &lt;td&gt;* Anydesk&lt;/td&gt;
                                &lt;td&gt;Necessário para Suporte remoto.&lt;/td&gt;
                                &lt;td&gt;Obrigatório (Apenas Home Office)&lt;/td&gt;
                            &lt;/tr&gt;
                            &lt;tr&gt;
                                &lt;td&gt;* Matrícula&lt;/td&gt;
                                &lt;td&gt;Necessário para controle de reincidências e registro.&lt;/td&gt;
                                &lt;td&gt;Obrigatório (Presencial e Home Office)&lt;/td&gt;
                            &lt;/tr&gt;
                        &lt;/tbody&gt;
                    &lt;/table&gt;
                &lt;/div&gt;
            &lt;/div&gt;
        &lt;/div&gt;
        &lt;div id=&quot;entendendo-atendimento&quot; class=&quot;tab-content&quot;&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-tasks&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Como seu Chamado é Tratado?&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;Depois de aberto, seu chamado passa por um fluxo para garantir a melhor
                        priorização e resolução. Entenda os conceitos-chave:&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-sort-amount-up&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Impacto e Urgência = Prioridade&lt;/h4&gt;
                            &lt;p&gt;A prioridade do seu chamado é calculada com base no &lt;strong&gt;Impacto&lt;/strong&gt; (quantos
                                usuários são afetados) e na &lt;strong&gt;Urgência&lt;/strong&gt; (qual a criticidade do serviço
                                para a operação).&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-hourglass-half&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Prazo de Atendimento (Incidentes)&lt;/h4&gt;
                            &lt;ul class=&quot;sla-list&quot;&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-exclamation-circle high&quot;&gt;&lt;/i&gt; &lt;strong&gt;Alta prioridade:&lt;/strong&gt; Até
                                    2 horas&lt;/li&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-exclamation-triangle medium&quot;&gt;&lt;/i&gt; &lt;strong&gt;Média
                                        prioridade:&lt;/strong&gt; Até 10 horas&lt;/li&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-info-circle low&quot;&gt;&lt;/i&gt; &lt;strong&gt;Baixa prioridade:&lt;/strong&gt; Até 24
                                    horas&lt;/li&gt;
                            &lt;/ul&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-calendar-alt&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Prazo de Atendimento (Requisições)&lt;/h4&gt;
                            &lt;ul class=&quot;sla-list&quot;&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-exclamation-circle high&quot;&gt;&lt;/i&gt; &lt;strong&gt;Alta prioridade:&lt;/strong&gt; 2
                                    dias&lt;/li&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-exclamation-triangle medium&quot;&gt;&lt;/i&gt; &lt;strong&gt;Média
                                        prioridade:&lt;/strong&gt; 7 dias&lt;/li&gt;
                                &lt;li&gt;&lt;i class=&quot;fas fa-info-circle low&quot;&gt;&lt;/i&gt; &lt;strong&gt;Baixa prioridade:&lt;/strong&gt; 10 dias
                                &lt;/li&gt;
                            &lt;/ul&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                    &lt;p class=&quot;sla-note&quot;&gt;&lt;strong&gt;NOTA:&lt;/strong&gt; O prazo de atendimento pode variar conforme a
                        complexidade do chamado e o volume de demandas em andamento.&lt;/p&gt;
                &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-tachometer-alt&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;Definição de Impacto&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;p class=&quot;intro-text&quot;&gt;A criticidade dos incidentes é medida pelo percentual da operação que é
                        afetada:&lt;/p&gt;
                    &lt;div class=&quot;item-grid&quot;&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-bomb&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Alto&lt;/h4&gt;
                            &lt;p&gt;Mais de 75% da operação total está sendo impactada ou interrupção total dos serviços
                                operacionais.&lt;br&gt;&lt;strong&gt;CONTRATO LOCTK2602-0004&lt;/strong&gt;&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-exclamation-triangle&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Médio&lt;/h4&gt;
                            &lt;p&gt;Entre 30% e 75% da operação total está sendo impactada ou interrupção nas
                                operações/serviços que tenham algum impacto negativo ou degradado, contudo, não impeçam
                                o seu funcionamento.&lt;/p&gt;
                        &lt;/div&gt;
                        &lt;div class=&quot;grid-item&quot;&gt;
                            &lt;i class=&quot;fas fa-info-circle&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Baixo&lt;/h4&gt;
                            &lt;p&gt;Menos de 30% da operação total está sendo impactada ou alguma interrupção pontual das
                                operações ou serviços, com baixo impacto em reduzido número de equipamentos.&lt;/p&gt;
                        &lt;/div&gt;
                    &lt;/div&gt;
                &lt;/div&gt;
            &lt;/div&gt;
            &lt;div class=&quot;card&quot;&gt;
                &lt;div class=&quot;card-header&quot;&gt;&lt;i class=&quot;fas fa-sync-alt&quot;&gt;&lt;/i&gt;
                    &lt;h2&gt;O Ciclo de Vida de um Chamado&lt;/h2&gt;
                &lt;/div&gt;
                &lt;div class=&quot;card-body&quot;&gt;
                    &lt;div class=&quot;status-flow-container&quot;&gt;
                        &lt;div class=&quot;status-card status-novo&quot;&gt;
                            &lt;i class=&quot;fas fa-plus-circle&quot;&gt;&lt;/i&gt;
                            &lt;h4&gt;Novo&lt;/h4&gt;
                            &lt;p&gt;Aguardando atribuição.&lt;/p&gt;
                        &lt;/div&gt;

    &lt;script&gt;
        // Lógica de Abas, Capa, e Modal
        function openTab(evt, tabName) {
            let i, tabContent, tabButtons;
            tabContent = document.getElementsByClassName(&quot;tab-content&quot;);
            for (i = 0; i &lt; tabContent.length; i++) { tabContent[i].classList.remove(&quot;active&quot;); }
            tabButtons = document.getElementsByClassName(&quot;tab-button&quot;);
            for (i = 0; i &lt; tabButtons.length; i++) { tabButtons[i].classList.remove(&quot;active&quot;); }
            setTimeout(() =&gt; document.getElementById(tabName).classList.add(&quot;active&quot;), 10);
            if (evt.currentTarget.classList.contains(&#x27;tab-button&#x27;)) { evt.currentTarget.classList.add(&quot;active&quot;); }
            else { document.querySelector(&#x27;button[onclick*=&quot;\&#x27;inicio\&#x27;&quot;]&#x27;).classList.add(&quot;active&quot;); }
        }

        document.addEventListener(&quot;DOMContentLoaded&quot;, () =&gt; {
            document.querySelector(&#x27;.tab-button&#x27;).classList.add(&#x27;active&#x27;);
            document.querySelector(&#x27;.tab-content&#x27;).classList.add(&#x27;active&#x27;);

            const observer = new IntersectionObserver((entries) =&gt; {
                entries.forEach(entry =&gt; {
                    if (entry.isIntersecting) {
                        entry.target.classList.add(&#x27;visible&#x27;);
                    }
                });
            }, { threshold: 0.1 });

            const cardsToAnimate = document.querySelectorAll(&#x27;.card&#x27;);
            cardsToAnimate.forEach(card =&gt; observer.observe(card));
        });

        const modal = document.getElementById(&quot;infoModal&quot;), modalTitle = document.getElementById(&quot;modalTitle&quot;), modalContent = document.getElementById(&quot;modalContent&quot;);
        function openInfoModal(title, text) { modalTitle.textContent = title; modalContent.innerHTML = text; modal.style.display = &quot;block&quot;; }
        function closeInfoModal() { modal.style.display = &quot;none&quot;; }
        window.onclick = (event) =&gt; { if (event.target == modal) { closeInfoModal(); } }

        // Lógica da Barra Lateral (Sidebar)
        const sidebar = document.getElementById(&quot;sidebar&quot;), overlay = document.getElementById(&quot;overlay&quot;);
        const openSidebar = () =&gt; { sidebar.classList.add(&quot;active&quot;); overlay.classList.add(&quot;active&quot;); }
        const closeSidebar = () =&gt; { sidebar.classList.remove(&quot;active&quot;); overlay.classList.remove(&quot;active&quot;); }
        document.querySelectorAll(&#x27;.sidebar .sidebar-item &gt; a&#x27;).forEach(item =&gt; {
            item.addEventListener(&#x27;click&#x27;, function (event) {
                event.preventDefault();
                this.parentElement.classList.toggle(&#x27;active&#x27;);
            });
        });

    <script>
        function showTab(index) {
            const iframes = document.querySelectorAll('iframe');
            iframes.forEach(iframe => iframe.style.display = 'none');
            
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById('iframe_' + index).style.display = 'block';
            buttons[index].classList.add('active');
        }
